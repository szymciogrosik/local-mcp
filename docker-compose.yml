version: "3.8"
services:
  documentation-mcp:
    build: ./documentation-mcp
    deploy:
      resources:
        limits:
          memory: 2G
    ports:
      - "8383:8080"
    environment:
      - CONFIG_SYNC_INTERVAL=PT1M
      - SPRING_PROFILES_ACTIVE=docker
    volumes:
      # Documentation config
      - ./documentation-mcp/config:/app/config
      # Application config file (contain docker-compose ports references)
      - ./documentation-mcp/config/application-docker.yml:/app/resources/application-docker.yml
      # Container sync data
      - local_mcp_documentation_data:/data
      # Location of parsed documentation to md files stored in the volume
      - local_mcp_converted_md_files:/app/markdown_output
      # Path to local copy of documents, mcp-config.json file uses this mount path as prefix, e.g. /_documents_copy/ncai/deliverables
      - C:\_documents_copy:/_documents_copy
      # Local additional documents
      - ./documentation-mcp/_local-documents:/_documents_copy/local
    depends_on:
      - documentation-database-qdrant
    restart: unless-stopped

  documentation-database-qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - local_mcp_qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  local_mcp_documentation_data:
  local_mcp_converted_md_files:
  local_mcp_qdrant_storage:
